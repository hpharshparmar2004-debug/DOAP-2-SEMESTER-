<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

.container{max-width:900px;margin:auto;padding:20px}

/* FIX: show login first */
.login{display:block}
.exam{display:none}

.card{background:#1e293b;padding:25px;border-radius:12px}
h2{text-align:center}
input{width:100%;padding:10px;margin:10px 0;border-radius:6px;border:none}
button{padding:10px 20px;border:none;border-radius:6px;background:#3b82f6;color:#fff;cursor:pointer;margin:5px}

.nav{display:flex;flex-wrap:wrap}
.nav div{
width:30px;height:30px;margin:3px;border-radius:50%;
background:red;text-align:center;line-height:30px;font-size:12px;cursor:pointer
}
.nav .done{background:green}

<body>
<div class="container">

<!-- LOGIN -->
<div class="login card" id="login">
<h2>RGCSM Login</h2>
<input id="user" placeholder="rgcsm001">
<input type="password" id="pass" placeholder="001">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- EXAM -->
<div class="exam card" id="exam">
<h2>RGCSM Semester II Examination</h2>
<p id="username"></p>
<p>Time Left: <span id="time">60:00</span></p>

<div id="questionBox"></div>

<button onclick="prev()">Previous</button>
<button onclick="saveNext()">Save & Next</button>
<button onclick="submitExam()">Submit</button>

<div class="nav" id="nav"></div>
</div>

</div>

<script>

/* ===== VARIABLES ===== */
let qIndex = 0;
let answers = new Array(100).fill(null);
let timer = 3600;

/* ===== DOM ===== */
const loginDiv = document.getElementById("login");
const examDiv = document.getElementById("exam");
const userInput = document.getElementById("user");
const passInput = document.getElementById("pass");
const usernameText = document.getElementById("username");
const msg = document.getElementById("msg");
const timeText = document.getElementById("time");
const nav = document.getElementById("nav");
const questionBox = document.getElementById("questionBox");

/* ===== LOGIN ===== */
function login(){
let u = userInput.value.trim();
let p = passInput.value.trim();

if(/^rgcsm\d{3}$/.test(u) && u.slice(5)===p){
loginDiv.style.display="none";
examDiv.style.display="block";
usernameText.innerText="User: "+u;
start();
}else{
msg.innerText="Invalid Login";
}
}

/* ===== START ===== */
function start(){
prepareQuestions(); // 🔥 shuffle options

showQ();

setInterval(()=>{
timer--;
let m=Math.floor(timer/60);
let s=timer%60;
timeText.innerText=`${m}:${s<10?"0":""}${s}`;

if(timer<=0) submitExam();
},1000);

/* NAV */
for(let i=0;i<questions.length;i++){
let d=document.createElement("div");
d.innerText=i+1;
d.onclick=()=>{qIndex=i;showQ()};
nav.appendChild(d);
}
}

/* ===== SHUFFLE FUNCTION ===== */
function shuffleArray(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

/* ===== PREPARE QUESTIONS (IMPORTANT) ===== */
function prepareQuestions(){
questions.forEach(q=>{
let correctText = q.o[q.ans]; // original correct

q.o = shuffleArray(q.o); // shuffle options

q.ans = q.o.indexOf(correctText); // update new correct index
});
}

/* ===== SHOW QUESTION ===== */
function showQ(){
let q = questions[qIndex];

let html=`<h3>Q${qIndex+1}. ${q.q}</h3>`;

q.o.forEach((opt,i)=>{
html+=`
<p>
<input type="radio" name="opt" value="${i}" ${answers[qIndex]==i?"checked":""}>
${String.fromCharCode(65+i)}. ${opt}
</p>`;
});

questionBox.innerHTML=html;
}

/* ===== SAVE ===== */
function saveNext(){
document.querySelectorAll("input[name=opt]").forEach(o=>{
if(o.checked) answers[qIndex]=+o.value;
});

updateNav();

if(qIndex < questions.length-1) qIndex++;
showQ();
}

/* ===== PREVIOUS ===== */
function prev(){
if(qIndex>0) qIndex--;
showQ();
}

/* ===== NAV UPDATE ===== */
function updateNav(){
[...nav.children].forEach((d,i)=>{
if(answers[i]!=null) d.classList.add("done");
});
}

/* ===== SUBMIT ===== */
function submitExam(){
alert("Exam Submitted");
document.body.innerHTML="<h2 style='text-align:center'>Exam Submitted</h2>";
}
