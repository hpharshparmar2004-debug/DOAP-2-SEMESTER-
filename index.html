<!DOCTYPE html>

<head>

<style>
body{

/* CONTAINER */
.container{

}

/* LOGIN UI */
.login{
display:flex;

align-items:center;
height:100vh;
}

.login-card{
background:rgba(255,255,255,0.08);

padding:40px;
border-radius:15px;
width:320px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
text-align:center;
}

.login-card h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
outline:none;
background:#0f172a;
color:#fff;
}

/* BUTTON */
button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
transform:scale(1.05);
}

/* EXAM UI */
.exam{
display:none;
}

/* HEADER BAR */
.header{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.timer{
font-size:18px;
font-weight:bold;
color:#facc15;
}

/* QUESTION BOX */
.question-box{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

.question-box h3{
margin-bottom:15px;
}

/* OPTIONS */
.option{
background:#0f172a;
padding:10px;
margin:8px 0;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#1e40af;
}

/* NAV BUTTONS */
.nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:15px;
}

.nav div{
width:35px;
height:35px;
margin:4px;
border-radius:50%;
background:#ef4444;
text-align:center;
line-height:35px;
font-size:13px;
cursor:pointer;
transition:0.2s;
}

.nav div:hover{
transform:scale(1.1);
}

.nav .done{
background:#22c55e;
}

/* ACTION BUTTONS */
.actions{
text-align:center;
margin-top:10px;
}
</style>

<body>
<div class="container">

<div class="login" id="login">
<div class="login-card">
<h2>RGCSM Exam Portal</h2>
<input id="user" placeholder="Username (rgcsm001)">
<input type="password" id="pass" placeholder="Password (001)">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>
</div>

<div class="exam" id="exam">

<div class="header">
<div>RGCSM Semester II Examination</div>
<div id="username"></div>
<div class="timer">⏱ <span id="time">60:00</span></div>
</div>

<div class="question-box" id="questionBox"></div>

<div class="actions">
<button onclick="prev()">Previous</button>
<button onclick="saveNext()">Save & Next</button>
<button onclick="submitExam()">Submit</button>
</div>

<div class="nav" id="nav"></div>

</div>

</div>

<script>

let qIndex=0;
let answers=new Array(100).fill(null);
let timer=3600;

function login(){
let u = document.getElementById("user").value.trim();
let p = document.getElementById("pass").value.trim();

if(/^rgcsm\d{3}$/.test(u) && u.slice(5) === p){
document.getElementById("login").style.display = "none";
document.getElementById("exam").style.display = "block";
document.getElementById("username").innerText = "User: " + u;
start();
}else{
document.getElementById("msg").innerText = "Invalid Login";
}
}

function start(){
showQ();
setInterval(()=>{
timer--;
let m=Math.floor(timer/60),s=timer%60;
time.innerText=`${m}:${s<10?"0":""}${s}`;
if(timer<=0)submitExam();
},1000);

for(let i=0;i<100;i++){
let d=document.createElement("div");
d.innerText=i+1;
d.onclick=()=>{qIndex=i;showQ()};
nav.appendChild(d);
}
}

function showQ(){
let q=questions[qIndex];
let html=`<h3>Q${qIndex+1}. ${q.q}</h3>`;
q.o.forEach((opt,i)=>{
html+=`<p><input type="radio" name="opt" value="${i}" ${answers[qIndex]==i?"checked":""}> ${opt}</p>`;
});
questionBox.innerHTML=html;
}

function saveNext(){
document.querySelectorAll("input[name=opt]").forEach(o=>{
if(o.checked)answers[qIndex]=+o.value;
});
updateNav();
if(qIndex<99)qIndex++;
showQ();
}

function prev(){if(qIndex>0)qIndex--;showQ();}

function updateNav(){
[...nav.children].forEach((d,i)=>{
if(answers[i]!=null)d.classList.add("done");
});
}

function submitExam(){
alert("Exam Submitted Successfully");
document.body.innerHTML="<h2 style='text-align:center'>Exam Submitted</h2>";
}
